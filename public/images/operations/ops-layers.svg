  <text x="80" y="270" fill="#9FB3C8" font-family="system-ui,sans-serif" font-size="14">• Status coordination</text>
  <text x="80" y="300" fill="#9FB3C8" font-family="system-ui,sans-serif" font-size="14">• Issue intake</text>
  <text x="80" y="330" fill="#9FB3C8" font-family="system-ui,sans-serif" font-size="14">• Escalation routing</text>
  <text x="80" y="360" fill="#9FB3C8" font-family="system-ui,sans-serif" font-size="14">• SLA monitoring</text>
  <path d="M400 290 H430" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
