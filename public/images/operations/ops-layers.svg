  <text x="492" y="270" fill="#486581" font-family="system-ui,sans-serif" font-size="14">• Field presence</text>
  <text x="492" y="300" fill="#486581" font-family="system-ui,sans-serif" font-size="14">• Wide-reaching coverage</text>
  <text x="492" y="330" fill="#486581" font-family="system-ui,sans-serif" font-size="14">• Quality control</text>
  <text x="492" y="360" fill="#486581" font-family="system-ui,sans-serif" font-size="14">• Local issue handling</text>
  <path d="M812 290 H842" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
