    <text x="908" y="258" fill="#0B3A6E" font-size="24" font-weight="800">Technology</text>
    <text x="840" y="320" fill="#486581" font-size="15">Dashboards, automation,</text>
    <text x="840" y="345" fill="#486581" font-size="15">and ProQPay payroll</text>
    <text x="840" y="400" fill="#486581" font-size="14">• Process visibility</text>
    <text x="840" y="430" fill="#486581" font-size="14">• Digital workflows</text>
