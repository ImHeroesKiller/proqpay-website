  <text x="60" y="110" fill="#486581" font-family="system-ui,sans-serif" font-size="16">Three integrated pillars of MSG delivery</text>
  <g font-family="system-ui,sans-serif">
    <rect x="60" y="180" width="340" height="360" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
