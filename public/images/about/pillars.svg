    <circle cx="120" cy="250" r="28" fill="#0B3A6E"/>
    <text x="112" y="257" fill="#FFFFFF" font-size="18" font-weight="700">P</text>
    <text x="168" y="258" fill="#0B3A6E" font-size="24" font-weight="800">People</text>
    <text x="100" y="320" fill="#486581" font-size="15">Sourcing, onboarding,</text>
    <text x="100" y="345" fill="#486581" font-size="15">deployment, and admin</text>
    <text x="100" y="400" fill="#486581" font-size="14">• Talent readiness</text>
    <text x="100" y="430" fill="#486581" font-size="14">• Role alignment</text>
