    <rect x="430" y="180" width="340" height="360" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="430" y="180" width="340" height="10" rx="5" fill="#0B3A6E"/>
    <circle cx="490" cy="250" r="28" fill="#0B3A6E"/>
    <text x="481" y="257" fill="#FFFFFF" font-size="18" font-weight="700">O</text>
    <text x="538" y="258" fill="#0B3A6E" font-size="24" font-weight="800">Operations</text>
    <text x="470" y="320" fill="#486581" font-size="15">Governance, attendance,</text>
    <text x="470" y="345" fill="#486581" font-size="15">payroll coord, reporting</text>
    <text x="470" y="400" fill="#486581" font-size="14">• SOP discipline</text>
    <text x="470" y="430" fill="#486581" font-size="14">• Multi-site control</text>
